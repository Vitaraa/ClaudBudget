<!DOCTYPE html>
<html lang="en" data-theme="light" data-surface="linen">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ClaudBudget — Dashboard</title>

<!-- Claud design system -->
<link rel="stylesheet" href="_ds/claud-design-system-de602a13-a618-4a60-8ce9-b2eadaeafb01/styles.css" />
<script src="/boot.js"></script>
<script>if (window.ClaudRequireAuth) ClaudRequireAuth();</script>

<style>
  /* ============================================================
     WARM RE-POINT of the Claud tokens.
     Claud ships cool azure-on-near-black. Here we keep the exact
     component vocabulary but re-point surfaces + accent to a warm,
     terracotta / sand / sage system. Both themes are warmed.
     Semantic soft/line tints derive from --accent via color-mix,
     so changing the accent cascades automatically.
     ============================================================ */

  :root[data-theme="light"] {
    --text: #2b2520;
    --muted: #8c8074;
    --hover: rgba(120, 86, 48, 0.06);

    --accent: #c05f2e;            /* terracotta (default) */
    --accent-contrast: #fffaf4;
    --accent-soft: color-mix(in srgb, var(--accent) 13%, transparent);
    --accent-line: color-mix(in srgb, var(--accent) 42%, transparent);

    --green: #4f9a6a;            /* warm sage */
    --green-soft: color-mix(in srgb, var(--green) 15%, transparent);
    --green-line: color-mix(in srgb, var(--green) 40%, transparent);
    --red: #cb3a52;             /* crimson-rose — pulled off the terracotta hue */
    --red-soft: color-mix(in srgb, var(--red) 12%, transparent);
    --red-line: color-mix(in srgb, var(--red) 40%, transparent);
    --warn: #cf8a2c;
    --warn-soft: color-mix(in srgb, var(--warn) 15%, transparent);
    --warn-line: color-mix(in srgb, var(--warn) 42%, transparent);

    --shadow-menu: 0 12px 30px rgba(74, 48, 24, 0.14);
    --shadow-pop: 0 14px 34px rgba(74, 48, 24, 0.18);
    --scrim: rgba(40, 28, 16, 0.4);
  }

  /* Light surface warmth variants (the "Surface" tweak) */
  :root[data-theme="light"][data-surface="sand"] {
    --bg: #f3ece1; --sidebar: #fbf6ee; --card: #fffbf5; --input-bg: #f0e7d9; --border: #e7dbc8;
  }
  :root[data-theme="light"][data-surface="cream"] {
    --bg: #f8f3ea; --sidebar: #fffdf8; --card: #ffffff; --input-bg: #f3ecdf; --border: #ece2d2;
  }
  :root[data-theme="light"][data-surface="linen"] {
    --bg: #ece3d4; --sidebar: #f7f0e4; --card: #fbf5ec; --input-bg: #e8ddca; --border: #ddcfb8;
  }

  :root[data-theme="dark"] {
    /* Near-neutral charcoal with only a faint warm cast — dialed back from brown. */
    --bg: #161513; --sidebar: #1c1b18; --card: #201e1b; --input-bg: #272420; --border: #322f2a;
    --hover: rgba(255, 244, 232, 0.045);
    --text: #ece6dc; --muted: #968d80;

    --accent: #cf7846;          /* softer terracotta on dark */
    --accent-contrast: #1a1208;
    --accent-soft: color-mix(in srgb, var(--accent) 15%, transparent);
    --accent-line: color-mix(in srgb, var(--accent) 40%, transparent);

    --green: #54bd86; --green-soft: color-mix(in srgb, var(--green) 16%, transparent); --green-line: color-mix(in srgb, var(--green) 42%, transparent);
    --red: #e85f74; --red-soft: color-mix(in srgb, var(--red) 16%, transparent); --red-line: color-mix(in srgb, var(--red) 44%, transparent);
    --warn: #e0a24a; --warn-soft: color-mix(in srgb, var(--warn) 16%, transparent); --warn-line: color-mix(in srgb, var(--warn) 44%, transparent);
    color-scheme: dark;
  }
  :root[data-theme="dark"] { --muted: #a39785; }

  /* ------------------------------------------------------------------ */
  /* Layout (these classes are NOT in the shared DS css — they're ours)  */
  /* ------------------------------------------------------------------ */

  /* Themed scrollbars — match surfaces instead of the default white/light track */
  * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  *::-webkit-scrollbar { width: 10px; height: 10px; }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-thumb {
    background: var(--border); border-radius: 999px;
    border: 2px solid transparent; background-clip: padding-box;
  }
  *::-webkit-scrollbar-thumb:hover { background: var(--muted); background-clip: padding-box; }
  *::-webkit-scrollbar-corner { background: transparent; }

  html, body { height: 100%; }
  body { overflow: hidden; }

  .app { display: flex; height: 100vh; }

  /* ---- Sidebar ---- */
  .sidebar {
    width: 230px; flex-shrink: 0; background: var(--sidebar);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; padding: 18px 12px;
    height: 100vh; position: sticky; top: 0;
    /* sticky establishes a stacking context — lift it above main content (z auto)
       so the sidebar Insights popup, which overflows right into content, paints
       on top. Kept below all modals/overlays (z >= 100). */
    z-index: 90;
  }
  .side-brand { display: flex; align-items: center; gap: 10px; padding: 8px 8px 22px; }
  .side-brand .brand-logo { width: 30px; height: 30px; color: var(--text); }
  .side-brandname { font-size: var(--text-h2); font-weight: 700; letter-spacing: var(--tracking-tight); }
  .side-nav { display: flex; flex-direction: column; gap: 2px; }
  .side-tab {
    text-align: left; background-color: transparent; border: none; color: var(--muted);
    font-size: var(--text-sm); font-weight: 600; padding: 10px 12px;
    border-radius: var(--radius-md); cursor: pointer; font-family: inherit;
    transition: background-color var(--dur-fast), color var(--dur-fast);
  }
  .side-tab:hover { background-color: var(--hover); color: var(--text); }
  .side-on, .side-on:hover { background-color: var(--accent); color: var(--accent-contrast); }
  .side-foot { margin-top: auto; padding-top: 12px; border-top: 1px solid var(--border); }
  .user-btn {
    width: 100%; display: flex; align-items: center; gap: 10px; background: none;
    border: none; padding: 9px 8px; border-radius: var(--radius-lg); cursor: pointer;
    color: var(--text); font-family: inherit; transition: background var(--dur-fast);
  }
  .user-btn:hover { background: var(--hover); }
  .user-name { font-size: var(--text-sm); font-weight: 600; flex: 1; text-align: left; }
  .user-sub { font-size: var(--text-2xs); color: var(--muted); display: block; font-weight: 400; }
  .user-caret { color: var(--muted); font-size: 12px; }

  /* ---- User dropdown menu ---- */
  .user-wrap { position: relative; }
  .user-btn.open { background: var(--hover); }
  .user-menu {
    position: absolute; left: 0; right: 0; bottom: calc(100% + 8px);
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg);
    box-shadow: var(--shadow-menu); padding: 6px; z-index: 60;
  }
  .user-menu-head { display: flex; align-items: center; gap: 10px; padding: 8px 8px 11px; }
  .user-menu-head .avatar { width: 36px; height: 36px; }
  .umh-id { min-width: 0; }
  .umh-name { font-size: var(--text-sm); font-weight: 700; letter-spacing: var(--tracking-tight); }
  .umh-mail { font-size: var(--text-2xs); color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-menu-list, .user-menu-foot { display: flex; flex-direction: column; gap: 1px; padding-top: 6px; border-top: 1px solid var(--border); }
  .um-item {
    display: flex; align-items: center; gap: 11px; width: 100%; text-align: left;
    background: none; border: none; color: var(--text); font-family: inherit;
    font-size: var(--text-sm); font-weight: 600; padding: 9px 9px; border-radius: var(--radius-md);
    cursor: pointer; transition: background var(--dur-fast);
  }
  .um-item:hover { background: var(--hover); }
  .um-item svg { width: 17px; height: 17px; color: var(--muted); flex-shrink: 0; }
  .um-item.danger { color: var(--red); }
  .um-item.danger svg { color: var(--red); }
  .um-item.upgrade { color: var(--accent); }
  .um-item.upgrade svg { color: var(--accent); }
  .um-item.upgrade:hover { background: var(--accent-soft); }

  /* ---- Upgrade to Pro modal (sits inside .set-overlay) ---- */
  .up {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius-xl); box-shadow: 0 24px 60px rgba(40, 28, 16, 0.4);
    width: 100%; display: flex; flex-direction: column; overflow: hidden;
    max-height: calc(100vh - 64px); overflow-y: auto;
    /* hide the scrollbar — keep scroll, lose the asymmetry */
    scrollbar-width: none; -ms-overflow-style: none;
  }
  .up::-webkit-scrollbar { width: 0; height: 0; display: none; }
  .up.cards { max-width: 720px; }

  .up-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; padding: 22px 24px 18px; }
  .up-head-text h2 { margin: 0; font-size: 1.4rem; font-weight: 700; letter-spacing: var(--tracking-tight); }
  .up-head-text p { margin: 6px 0 0; font-size: var(--text-sm); color: var(--muted); line-height: 1.5; max-width: 42ch; text-wrap: pretty; }
  .up-close { flex-shrink: 0; background: none; border: none; color: var(--muted); font-size: 23px; line-height: 1; cursor: pointer; padding: 2px 8px; border-radius: var(--radius-sm); transition: color var(--dur-fast), background var(--dur-fast); }
  .up-close:hover { color: var(--text); background: var(--hover); }

  .up-billing { display: flex; align-items: center; gap: 12px; padding: 0 24px 18px; }
  .up-seg { display: inline-flex; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; background: var(--input-bg); }
  .up-seg button { background: none; border: none; padding: 7px 15px; font-family: inherit; font-size: var(--text-xs); font-weight: 600; color: var(--muted); cursor: pointer; transition: color var(--dur-fast), background var(--dur-fast); }
  .up-seg button + button { border-left: 1px solid var(--border); }
  .up-seg button.on { background: var(--accent-soft); color: var(--accent); }
  .up-save { font-size: var(--text-2xs); font-weight: 600; color: var(--green); background: var(--green-soft); border: 1px solid var(--green-line); padding: 2px 9px; border-radius: var(--radius-pill); white-space: nowrap; }

  .up-cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 2px 24px 22px; }
  .plan { position: relative; display: flex; flex-direction: column; gap: 16px; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px 18px; background: var(--bg); }
  .plan.pro { border-color: var(--accent-line); background: var(--accent-soft); }
  .plan-eyebrow { font-size: var(--text-2xs); font-weight: 700; text-transform: uppercase; letter-spacing: var(--tracking-wider); color: var(--muted); }
  .plan.pro .plan-eyebrow { color: var(--accent); }
  .plan-rec { position: absolute; top: -10px; right: 16px; font-size: var(--text-2xs); font-weight: 700; letter-spacing: var(--tracking-wide); text-transform: uppercase; color: var(--accent-contrast); background: var(--accent); padding: 3px 10px; border-radius: var(--radius-pill); }
  .plan-price { display: flex; align-items: baseline; gap: 5px; }
  .plan-price .pp-amt { font-size: 2.1rem; font-weight: 700; letter-spacing: var(--tracking-tight); font-variant-numeric: tabular-nums; line-height: 1; }
  .plan-price .pp-per { font-size: var(--text-sm); color: var(--muted); font-weight: 500; }
  .plan-sub { font-size: var(--text-2xs); color: var(--muted); font-variant-numeric: tabular-nums; min-height: 1.1em; margin-top: 5px; }
  .plan-line { font-size: var(--text-sm); color: var(--text); line-height: 1.5; text-wrap: pretty; margin: 0; }
  .plan .btn { width: 100%; justify-content: center; }
  .plan-feats { list-style: none; margin: 4px 0 0; padding: 14px 0 0; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 11px; }
  .plan.pro .plan-feats { border-top-color: var(--accent-line); }
  .feat { display: flex; gap: 10px; align-items: flex-start; }
  .feat-check { flex-shrink: 0; width: 17px; height: 17px; margin-top: 1px; color: var(--muted); }
  .feat-check svg { display: block; width: 100%; height: 100%; }
  .feat.key .feat-check { color: var(--accent); }
  .feat-body .feat-t { font-size: var(--text-sm); font-weight: 600; line-height: 1.35; }
  .feat-body .feat-d { font-size: var(--text-2xs); color: var(--muted); line-height: 1.45; margin-top: 2px; text-wrap: pretty; }
  .feat-more { font-size: var(--text-xs); color: var(--muted); font-weight: 600; }
  .up-foot-note { padding: 0 24px 20px; font-size: var(--text-2xs); color: var(--muted); text-align: center; }

  @media (max-width: 560px) {
    .up-cards-grid { grid-template-columns: 1fr; }
  }

  /* ---- Settings modal ---- */
  .set-overlay { position: fixed; inset: 0; background: var(--scrim); display: flex; align-items: center; justify-content: center; z-index: 120; padding: 24px; }
  .set-modal {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-xl);
    box-shadow: 0 24px 60px rgba(40, 28, 16, 0.4); width: 100%; max-width: 720px;
    max-height: 86vh; display: flex; flex-direction: column; overflow: hidden;
  }
  .set-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 17px 22px; border-bottom: 1px solid var(--border); }
  .set-head h2 { margin: 0; font-size: var(--text-h2); font-weight: 700; letter-spacing: var(--tracking-tight); }
  .set-close { background: none; border: none; color: var(--muted); font-size: 23px; line-height: 1; cursor: pointer; padding: 2px 8px; border-radius: var(--radius-sm); transition: color var(--dur-fast), background var(--dur-fast); }
  .set-close:hover { color: var(--text); background: var(--hover); }
  .set-main { display: flex; min-height: 0; flex: 1; }
  .set-nav { width: 188px; flex-shrink: 0; border-right: 1px solid var(--border); padding: 12px; display: flex; flex-direction: column; gap: 2px; }
  .set-nav button { display: flex; align-items: center; gap: 11px; text-align: left; background: none; border: none; color: var(--muted); font-family: inherit; font-size: var(--text-sm); font-weight: 600; padding: 10px 11px; border-radius: var(--radius-md); cursor: pointer; transition: background var(--dur-fast), color var(--dur-fast); }
  .set-nav button svg { width: 17px; height: 17px; flex-shrink: 0; }
  .set-nav button:hover { background: var(--hover); color: var(--text); }
  .set-nav button.on { background: var(--accent-soft); color: var(--accent); }
  .set-body { flex: 1; min-width: 0; overflow-y: auto; padding: 8px 24px 16px; }
  .set-row { display: flex; align-items: center; justify-content: space-between; gap: 20px; padding: 16px 0; border-bottom: 1px solid var(--border); }
  .set-row:last-child { border-bottom: none; }
  .set-row-label { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .set-row-label .srl-t { font-size: var(--text-sm); font-weight: 600; }
  .set-row-label .srl-d { font-size: var(--text-2xs); color: var(--muted); text-wrap: pretty; }
  .set-row-control { flex-shrink: 0; }
  .set-swatches { display: flex; gap: 9px; flex-wrap: wrap; }
  .set-sw { width: 28px; height: 28px; border-radius: 999px; border: 2px solid transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; transition: transform var(--dur-fast); box-shadow: 0 0 0 1px var(--border); }
  .set-sw:hover { transform: scale(1.08); }
  .set-sw.on { box-shadow: 0 0 0 2px var(--card), 0 0 0 4px var(--accent); }
  .set-sw svg { width: 15px; height: 15px; color: #fff; stroke-width: 3.2; }
  .set-select, .set-input { background: var(--input-bg); border: 1px solid var(--border); border-radius: var(--radius-md); color: var(--text); font-family: inherit; font-size: var(--text-sm); padding: 8px 11px; transition: border-color var(--dur-fast); }
  .set-select { min-width: 200px; cursor: pointer; }
  .set-input { min-width: 240px; box-sizing: border-box; }
  .set-select:focus, .set-input:focus { outline: none; border-color: var(--accent); }
  .set-foot { display: flex; align-items: center; gap: 10px; padding: 14px 22px; border-top: 1px solid var(--border); }
  .set-note { font-size: var(--text-2xs); color: var(--muted); margin-right: auto; }

  /* ---- Profile modal ---- */
  .pf-modal { max-width: 460px; }
  .pf-body { padding: 8px 24px 16px; overflow-y: auto; }
  .pf-identity { display: flex; align-items: center; gap: 14px; padding: 16px 0 18px; border-bottom: 1px solid var(--border); }
  .pf-avatar { width: 52px; height: 52px; font-size: 21px; font-weight: 700; flex-shrink: 0; }
  .pf-id-text { min-width: 0; }
  .pf-id-name { font-size: var(--text-h3, 17px); font-weight: 700; letter-spacing: var(--tracking-tight); }
  .pf-id-mail { font-size: var(--text-sm); margin-top: 2px; }
  .pf-body .set-input { min-width: 220px; }

  @media (max-width: 620px) {
    .set-main { flex-direction: column; }
    .set-nav { width: auto; flex-direction: row; flex-wrap: wrap; border-right: none; border-bottom: 1px solid var(--border); }
    .set-row { flex-direction: column; align-items: flex-start; gap: 10px; }
  }

  /* ---- Help & support modal ---- */
  .hs-modal {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-xl);
    box-shadow: 0 24px 60px rgba(40, 28, 16, 0.4); width: 100%; max-width: 540px;
    max-height: 86vh; display: flex; flex-direction: column; overflow: hidden;
  }
  .hs-back { display: inline-flex; align-items: center; gap: 6px; align-self: flex-start; margin: 12px 18px 0; background: none; border: none; color: var(--muted); font-family: inherit; font-size: var(--text-xs); font-weight: 600; padding: 5px 8px; margin-left: 14px; border-radius: var(--radius-md); cursor: pointer; transition: background var(--dur-fast), color var(--dur-fast); }
  .hs-back:hover { background: var(--hover); color: var(--text); }
  .hs-back svg { width: 15px; height: 15px; }
  .hs-body { overflow-y: auto; padding: 18px 22px 22px; }
  .hs-intro { margin: 0 0 16px; color: var(--muted); font-size: var(--text-sm); line-height: 1.6; text-wrap: pretty; }
  .hs-link { color: var(--accent); text-decoration: none; font-weight: 600; }
  .hs-link:hover { text-decoration: underline; }
  .hs-link.as-btn { background: none; border: none; padding: 0; font: inherit; cursor: pointer; }

  .hs-options { display: flex; flex-direction: column; gap: 10px; }
  .hs-option { display: flex; align-items: center; gap: 14px; width: 100%; text-align: left; background: var(--input-bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 15px 16px; cursor: pointer; font-family: inherit; transition: border-color var(--dur-fast), background var(--dur-fast); }
  .hs-option:hover { border-color: var(--accent-line); background: var(--hover); }
  .hs-option-ico { width: 40px; height: 40px; flex-shrink: 0; border-radius: var(--radius-md); background: var(--accent-soft); color: var(--accent); display: flex; align-items: center; justify-content: center; }
  .hs-option-ico svg { width: 21px; height: 21px; }
  .hs-option-text { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
  .hs-option-title { font-size: var(--text-sm); font-weight: 700; color: var(--text); letter-spacing: var(--tracking-tight); }
  .hs-option-desc { font-size: var(--text-2xs); color: var(--muted); }
  .hs-option-chev { color: var(--muted); flex-shrink: 0; display: flex; }
  .hs-option-chev svg { width: 17px; height: 17px; }

  .hs-form { display: flex; flex-direction: column; gap: 16px; }
  .hs-field { display: flex; flex-direction: column; gap: 7px; }
  .hs-field-label { font-size: var(--text-2xs); color: var(--muted); text-transform: uppercase; letter-spacing: var(--tracking-wide); font-weight: 700; }
  .hs-textarea, .hs-input { background: var(--input-bg); border: 1px solid var(--border); border-radius: var(--radius-md); color: var(--text); font-family: inherit; font-size: var(--text-sm); padding: 10px 12px; transition: border-color var(--dur-fast); box-sizing: border-box; width: 100%; }
  .hs-textarea { resize: vertical; line-height: 1.55; }
  .hs-textarea:focus, .hs-input:focus { outline: none; border-color: var(--accent); }
  .hs-textarea::placeholder, .hs-input::placeholder { color: var(--muted); }
  .hs-seg { display: inline-flex; border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; background: var(--input-bg); align-self: flex-start; }
  .hs-seg-btn { background: none; border: none; padding: 8px 14px; font-size: var(--text-xs); font-weight: 600; color: var(--muted); cursor: pointer; font-family: inherit; transition: color var(--dur-fast), background var(--dur-fast); }
  .hs-seg-btn + .hs-seg-btn { border-left: 1px solid var(--border); }
  .hs-seg-btn.on { background: var(--accent-soft); color: var(--accent); }
  .hs-form-foot { display: flex; align-items: center; gap: 14px; padding-top: 2px; }
  .hs-note { font-size: var(--text-2xs); color: var(--muted); flex: 1; text-wrap: pretty; }

  .hs-success { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 6px; padding: 24px 12px 8px; }
  .hs-success-ico { width: 52px; height: 52px; border-radius: 999px; background: var(--green-soft); border: 1px solid var(--green-line); color: var(--green); display: flex; align-items: center; justify-content: center; margin-bottom: 6px; }
  .hs-success-ico svg { width: 26px; height: 26px; }
  .hs-success-title { font-size: var(--text-h2); font-weight: 700; letter-spacing: var(--tracking-tight); }
  .hs-success-text { margin: 0; color: var(--muted); font-size: var(--text-sm); line-height: 1.6; max-width: 340px; text-wrap: pretty; }
  .hs-success-actions { display: flex; gap: 10px; margin-top: 16px; }

  .hs-faqs { display: flex; flex-direction: column; }
  .hs-faq { border-bottom: 1px solid var(--border); }
  .hs-faq:first-child { border-top: 1px solid var(--border); }
  .hs-faq-q { display: flex; align-items: center; justify-content: space-between; gap: 12px; width: 100%; text-align: left; background: none; border: none; color: var(--text); font-family: inherit; font-size: var(--text-sm); font-weight: 600; padding: 15px 4px; cursor: pointer; }
  .hs-faq-caret { color: var(--muted); flex-shrink: 0; display: flex; transition: transform var(--dur-fast); }
  .hs-faq-caret svg { width: 16px; height: 16px; transform: rotate(90deg); }
  .hs-faq.open .hs-faq-caret { transform: rotate(90deg); }
  .hs-faq.open .hs-faq-caret svg { transform: rotate(180deg); }
  .hs-faq-a { color: var(--muted); font-size: var(--text-sm); line-height: 1.65; padding: 0 4px 16px; text-wrap: pretty; }
  .hs-faq-foot { margin: 16px 0 0; color: var(--muted); font-size: var(--text-xs); line-height: 1.6; }

  /* ---- Main ---- */
  .main { flex: 1; min-width: 0; height: 100vh; overflow-y: scroll; scrollbar-gutter: stable; }
  .main-inner { max-width: 1180px; margin: 0 auto; padding: 22px 28px 64px; display: flex; flex-direction: column; gap: 18px; }
  .page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .page-head > div:first-child { flex: 1 1 auto; min-width: 0; }
  .page-head h1 { margin: 0; font-size: var(--text-h1); font-weight: 700; letter-spacing: var(--tracking-tight); }
  .page-sub { margin: 4px 0 0; color: var(--muted); font-size: var(--text-sm); }
  .head-actions { display: flex; align-items: center; gap: 10px; }
  .head-actions button, .txn-toolbar-actions button { white-space: nowrap; }

  /* Theme toggle */
  .theme-tog { display: inline-flex; border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; background: var(--input-bg); }
  .theme-tog button { background: none; border: none; padding: 7px 11px; font-size: var(--text-xs); font-weight: 600; color: var(--muted); cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 5px; transition: color var(--dur-fast), background var(--dur-fast); }
  .theme-tog button.on { background: var(--card); color: var(--text); }

  /* ---- KPI strip ---- */
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(215px, 1fr)); gap: 16px; }
  .kpi-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 16px; }
  .kpi { display: flex; flex-direction: column; gap: 7px; min-width: 0; }
  .kpi-label { display: flex; align-items: center; gap: 7px; color: var(--muted); font-size: var(--text-xs); white-space: nowrap; }
  .kpi-val { font-size: var(--text-h1); font-weight: 700; letter-spacing: var(--tracking-tight); font-variant-numeric: tabular-nums; }
  .kpi-delta { font-size: var(--text-xs); display: inline-flex; align-items: center; gap: 4px; font-variant-numeric: tabular-nums; white-space: nowrap; }

  /* ---- Dashboard grid ---- */
  .dash-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; }
  .span2 { grid-column: span 2; } .span3 { grid-column: span 3; } .span4 { grid-column: span 4; } .span6 { grid-column: span 6; }
  .widget { display: flex; flex-direction: column; gap: 14px; }
  .widget-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .widget-title { font-size: var(--text-sm); font-weight: 700; letter-spacing: -0.01em; }
  .widget-eyebrow { font-size: var(--text-2xs); text-transform: uppercase; letter-spacing: var(--tracking-wider); color: var(--muted); }

  /* ---- Net worth ---- */
  .nw-headline { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  .nw-value { font-size: var(--text-display); font-weight: 700; letter-spacing: var(--tracking-tight); font-variant-numeric: tabular-nums; }
  .chart-wrap { position: relative; width: 100%; }
  .chart-wrap svg { display: block; width: 100%; height: auto; }
  .chart-tip { position: absolute; transform: translate(-50%, -120%); background: var(--card); border: 1px solid var(--border); box-shadow: var(--shadow-pop); border-radius: var(--radius-md); padding: 7px 10px; pointer-events: none; white-space: nowrap; font-size: var(--text-xs); z-index: 4; }
  .chart-tip .tip-date { color: var(--muted); font-size: var(--text-2xs); }
  .chart-tip .tip-val { font-weight: 700; font-variant-numeric: tabular-nums; }

  /* ---- Spending ring ---- */
  .ring-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 4px 0; }
  .ring-center { position: relative; width: 168px; height: 168px; }
  .ring-center svg { transform: rotate(-90deg); }
  .ring-mid { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; }
  .ring-mid .rm-big { font-size: 1.7rem; font-weight: 700; letter-spacing: var(--tracking-tight); font-variant-numeric: tabular-nums; }
  .ring-mid .rm-small { font-size: var(--text-2xs); color: var(--muted); text-transform: uppercase; letter-spacing: var(--tracking-wide); }
  .ring-legend { display: flex; gap: 18px; }
  .ring-legend div { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .ring-legend .ll { font-size: var(--text-2xs); color: var(--muted); }
  .ring-legend .lv { font-weight: 700; font-variant-numeric: tabular-nums; font-size: var(--text-sm); }

  /* ---- Category list ---- */
  .cat-list { display: flex; flex-direction: column; gap: 13px; }
  .cat-row { display: flex; flex-direction: column; gap: 6px; }
  .cat-row[draggable] { cursor: grab; }
  .cat-row.dragging { opacity: 0.45; cursor: grabbing; }
  .cat-grip { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 18px; margin-left: -4px; color: var(--muted); opacity: 0; cursor: grab; transition: opacity var(--dur-fast); flex-shrink: 0; }
  .cat-grip svg { width: 16px; height: 16px; }
  .cat-row:hover .cat-grip, .cat-row:focus-within .cat-grip { opacity: 0.6; }
  .cat-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .cat-name { display: flex; align-items: center; gap: 9px; font-size: var(--text-sm); font-weight: 600; min-width: 0; }
  .cat-dot { width: 9px; height: 9px; border-radius: 999px; flex-shrink: 0; }
  .cat-fig { font-size: var(--text-xs); color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; flex-shrink: 0; }
  .cat-fig b { color: var(--text); font-weight: 700; }
  /* edit/delete affordances on a budget category row */
  .cat-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .cat-actions { display: flex; align-items: center; gap: 1px; width: 50px; justify-content: flex-end; flex-shrink: 0; }
  .cat-act { width: 24px; height: 24px; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; border-radius: var(--radius-sm); background: none; border: none; color: var(--muted); cursor: pointer; opacity: 0; transition: opacity var(--dur-fast), background var(--dur-fast), color var(--dur-fast); }
  .cat-row:hover .cat-act, .cat-row:focus-within .cat-act { opacity: 1; }
  .cat-act:hover { background: var(--hover); color: var(--text); }
  .cat-act.del:hover { background: var(--red-soft); color: var(--red); }
  .cat-act:focus-visible { opacity: 1; outline: 2px solid var(--accent); outline-offset: 1px; }
  .cat-act svg { width: 15px; height: 15px; }
  .cat-empty { font-size: var(--text-xs); color: var(--muted); padding: 2px 0; }
  .cat-add { display: inline-flex; align-items: center; gap: 7px; align-self: flex-start; margin-top: 2px; background: none; border: none; color: var(--muted); font-family: inherit; font-size: var(--text-xs); font-weight: 600; padding: 6px 8px; margin-left: -8px; border-radius: var(--radius-md); cursor: pointer; transition: background var(--dur-fast), color var(--dur-fast); }
  .cat-add:hover { background: var(--hover); color: var(--accent); }
  .cat-add svg { width: 15px; height: 15px; }

  /* ---- Cash flow bars ---- */
  .cf-legend { display: flex; gap: 16px; align-items: center; }
  .cf-leg { display: flex; align-items: center; gap: 6px; font-size: var(--text-xs); color: var(--muted); }
  .cf-leg .sw { width: 10px; height: 10px; border-radius: 3px; }

  /* ---- Transactions ---- */
  .txn-list { display: flex; flex-direction: column; }
  .txn { display: flex; align-items: center; gap: 12px; padding: 11px 6px; border-radius: var(--radius-md); margin: 0 -6px; transition: background var(--dur-fast); cursor: default; }
  .txn:hover { background: var(--hover); }
  .txn + .txn { border-top: 1px solid var(--border); }
  .txn-ico { width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: var(--input-bg); color: var(--accent); }
  .txn-ico svg { width: 19px; height: 19px; }
  .txn-body { flex: 1; min-width: 0; }
  .txn-name { font-size: var(--text-sm); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .txn-meta { font-size: var(--text-2xs); color: var(--muted); }
  .txn-amt { font-size: var(--text-sm); font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; }

  /* ---- Goals ---- */
  .goal { display: flex; flex-direction: column; gap: 8px; }
  .goal + .goal { margin-top: 4px; padding-top: 14px; border-top: 1px solid var(--border); }
  .goal-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .goal-name { display: flex; align-items: center; gap: 9px; font-size: var(--text-sm); font-weight: 600; }
  .goal-ico { width: 28px; height: 28px; border-radius: 8px; background: var(--input-bg); color: var(--accent); display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .goal-ico svg { width: 16px; height: 16px; display: block; }
  .goal-pct { font-size: var(--text-xs); color: var(--muted); font-variant-numeric: tabular-nums; }
  .goal-fig { font-size: var(--text-2xs); color: var(--muted); font-variant-numeric: tabular-nums; }
  .goal-fig b { color: var(--text); font-weight: 700; }

  /* ---- Accounts ---- */
  .acct-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0; }
  .acct { display: flex; flex-direction: column; gap: 9px; padding: 4px 18px; border-right: 1px solid var(--border); }
  .acct:last-child { border-right: none; }
  .acct:first-child { padding-left: 2px; }
  .acct-head { display: flex; align-items: center; gap: 9px; }
  .acct-ico { width: 32px; height: 32px; border-radius: 9px; background: var(--input-bg); color: var(--accent); display: flex; align-items: center; justify-content: center; }
  .acct-ico svg { width: 18px; height: 18px; }
  .acct-type { font-size: var(--text-2xs); color: var(--muted); text-transform: uppercase; letter-spacing: var(--tracking-wide); }
  .acct-name { font-size: var(--text-sm); font-weight: 600; }
  .acct-bal { font-size: 1.15rem; font-weight: 700; letter-spacing: var(--tracking-tight); font-variant-numeric: tabular-nums; }

  /* ============================================================
     ACCOUNTS PAGE
     ============================================================ */
  .acct-rows { display: flex; flex-direction: column; }
  .acct-row { display: flex; align-items: center; gap: 14px; padding: 13px 6px; margin: 0 -6px; border-radius: var(--radius-md); transition: background var(--dur-fast); }
  .acct-row:hover { background: var(--hover); }
  .acct-row + .acct-row { border-top: 1px solid var(--border); }
  .acct-row .acct-ico { width: 38px; height: 38px; flex-shrink: 0; }
  .acct-row .acct-ico svg { width: 20px; height: 20px; }
  .acct-row-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
  .acct-row-name { font-size: var(--text-sm); font-weight: 600; display: flex; align-items: center; gap: 9px; }
  .acct-row-meta { font-size: var(--text-2xs); color: var(--muted); font-variant-numeric: tabular-nums; }
  .apy-tag { font-size: var(--text-2xs); font-weight: 600; color: var(--green); background: var(--green-soft); border: 1px solid var(--green-line); padding: 1px 7px; border-radius: 999px; letter-spacing: 0; }
  .acct-spark { width: 92px; flex-shrink: 0; }
  .acct-spark svg { display: block; width: 100%; height: auto; }
  .acct-row-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; min-width: 116px; }
  .acct-row-bal { font-size: 1.02rem; font-weight: 700; letter-spacing: var(--tracking-tight); font-variant-numeric: tabular-nums; }
  .acct-row-chg { font-size: var(--text-2xs); font-variant-numeric: tabular-nums; }
  .group-sub { display: flex; align-items: baseline; gap: 10px; }
  .group-sub b { font-size: var(--text-sm); font-weight: 700; font-variant-numeric: tabular-nums; }

  /* ============================================================
     TRANSACTIONS PAGE
     ============================================================ */
  .txn-toolbar { display: flex; flex-direction: column; gap: 12px; }
  .txn-toolbar-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  /* controls row: filters cluster on the left, data-actions cluster on the right */
  .txn-toolbar-controls { justify-content: space-between; }
  .ttc-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .txn-toolbar-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .sort-filter .catf-btn-lbl { white-space: nowrap; }
  .txn-search { position: relative; flex: 1; min-width: 200px; max-width: 320px; }
  .txn-search svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--muted); pointer-events: none; }
  .txn-search input { width: 100%; box-sizing: border-box; background: var(--input-bg); border: 1px solid var(--border); border-radius: var(--radius-md); color: var(--text); font-family: inherit; font-size: var(--text-sm); padding: 9px 12px 9px 34px; transition: border-color var(--dur-fast); }
  .txn-search input:focus { outline: none; border-color: var(--accent); }
  .txn-search input::placeholder { color: var(--muted); }
  /* Single category filter button + multi-select popover */
  .cat-filter { position: relative; }
  .catf-btn { display: inline-flex; align-items: center; gap: 7px; background: var(--input-bg); border: 1px solid var(--border); color: var(--text); font-family: inherit; font-size: var(--text-sm); font-weight: 600; padding: 7px 11px; border-radius: var(--radius-sm); cursor: pointer; transition: all var(--dur-fast); }
  .catf-btn:hover { border-color: var(--accent-line); }
  .catf-btn .btn-ico { display: inline-flex; color: var(--muted); }
  .catf-btn .btn-ico svg { width: 16px; height: 16px; }
  .catf-btn .cat-caret { color: var(--muted); font-size: 10px; transition: transform var(--dur-fast); }
  .catf-btn.open { border-color: var(--accent-line); }
  .catf-btn.open .cat-caret { transform: rotate(180deg); }
  .catf-btn.active { background: var(--accent-soft); border-color: var(--accent-line); color: var(--accent); }
  .catf-btn.active .btn-ico { color: var(--accent); }
  .catf-count { display: inline-flex; align-items: center; justify-content: center; min-width: 18px; height: 18px; padding: 0 5px; border-radius: 999px; background: var(--accent); color: #fff; font-size: 11px; font-weight: 700; }
  .catf-menu { position: absolute; top: calc(100% + 6px); left: 0; z-index: 40; width: 224px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-pop); padding: 6px; }
  .catf-head { display: flex; align-items: center; justify-content: space-between; padding: 5px 7px 7px; font-size: var(--text-xs); text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); font-weight: 600; }
  .catf-clear { background: none; border: none; color: var(--accent); font-family: inherit; font-size: var(--text-xs); font-weight: 600; text-transform: none; letter-spacing: 0; cursor: pointer; padding: 0; }
  .catf-clear:hover { text-decoration: underline; }
  .catf-list { max-height: 280px; overflow-y: auto; display: flex; flex-direction: column; gap: 1px; }
  .catf-opt { display: flex; align-items: center; gap: 9px; padding: 7px 8px; border-radius: var(--radius-sm); background: none; border: none; cursor: pointer; font-family: inherit; font-size: var(--text-sm); color: var(--text); text-align: left; }
  .catf-opt:hover { background: var(--hover); }
  .catf-opt .cdot { width: 9px; height: 9px; border-radius: 999px; flex-shrink: 0; }
  .catf-name { flex: 1; }
  .catf-box { width: 16px; height: 16px; flex-shrink: 0; border: 1px solid var(--border); border-radius: 5px; display: inline-flex; align-items: center; justify-content: center; color: #fff; font-size: 11px; font-weight: 700; }
  .catf-box.on { background: var(--accent); border-color: var(--accent); }
  .catf-opt.on { color: var(--accent); font-weight: 600; }
  .catf-empty { padding: 12px 8px; color: var(--muted); font-size: var(--text-sm); text-align: center; }

  .txn-summary { display: flex; gap: 26px; flex-wrap: wrap; padding: 2px 2px 2px; }
  .txn-sum { display: flex; flex-direction: column; gap: 3px; }
  .txn-sum .ts-lbl { font-size: var(--text-2xs); color: var(--muted); text-transform: uppercase; letter-spacing: var(--tracking-wide); }
  .txn-sum .ts-val { font-size: var(--text-h2); font-weight: 700; letter-spacing: var(--tracking-tight); font-variant-numeric: tabular-nums; }

  .txn-table { display: flex; flex-direction: column; }
  .txn-day { font-size: var(--text-2xs); text-transform: uppercase; letter-spacing: var(--tracking-wider); color: var(--muted); font-weight: 700; padding: 16px 6px 7px; display: flex; justify-content: space-between; }
  .txn-day:first-child { padding-top: 2px; }
  .txn-day .day-tot { font-variant-numeric: tabular-nums; letter-spacing: 0; text-transform: none; }
  .trow { display: flex; align-items: center; gap: 13px; padding: 11px 6px; margin: 0 -6px; border-radius: var(--radius-md); transition: background var(--dur-fast); }
  .trow:hover { background: var(--hover); }
  .trow + .trow { border-top: 1px solid var(--border); }
  .trow-ico { width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: var(--input-bg); color: var(--accent); }
  .trow-ico svg { width: 19px; height: 19px; }
  .trow-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
  .trow-name { font-size: var(--text-sm); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .trow-tags { display: flex; align-items: center; gap: 9px; }
  .trow-when { font-size: var(--text-xs); color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; flex-shrink: 0; }
  .trow-when::before { content: "\00B7"; margin-right: 9px; color: var(--border); }
  .cat-badge { font-size: var(--text-2xs); font-weight: 600; padding: 2px 9px; border-radius: 999px; white-space: nowrap; }

  /* editable category badge + popover */
  .cat-edit { position: relative; display: inline-flex; }
  .cat-badge.editable { display: inline-flex; align-items: center; gap: 4px; border: 1px solid transparent; cursor: pointer; font-family: inherit; transition: filter var(--dur-fast), border-color var(--dur-fast); }
  .cat-badge.editable:hover { filter: brightness(1.12); border-color: currentColor; }
  .cat-badge.editable .cat-caret { font-size: 9px; line-height: 1; opacity: 0.7; transition: transform var(--dur-fast); }
  .cat-badge.editable.open .cat-caret { transform: rotate(180deg); }
  .cat-badge.editable:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .cat-menu { position: absolute; top: calc(100% + 6px); left: 0; z-index: 40; width: 196px; max-height: 256px; overflow-y: auto; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-md); box-shadow: var(--shadow-menu); padding: 5px; display: flex; flex-direction: column; gap: 1px; }
  .cat-opt { display: flex; align-items: center; gap: 9px; padding: 7px 9px; border-radius: var(--radius-sm); background: none; border: none; cursor: pointer; font-family: inherit; font-size: var(--text-sm); font-weight: 500; color: var(--text); text-align: left; transition: background var(--dur-fast); flex-shrink: 0; }
  .cat-opt:hover { background: var(--hover); }
  .cat-opt.on { color: var(--accent); font-weight: 600; }
  .cat-opt .cdot { width: 9px; height: 9px; border-radius: 999px; flex-shrink: 0; }
  .cat-opt .cat-opt-name { flex: 1; }
  .cat-opt .cat-check { color: var(--accent); font-size: var(--text-xs); }

  /* editable transaction icon + picker popover (used in Transactions tab and account detail) */
  .ico-edit { position: relative; display: inline-flex; flex-shrink: 0; }
  .trow-ico.editable { padding: 0; font: inherit; cursor: pointer; border: 1px solid transparent; transition: border-color var(--dur-fast), filter var(--dur-fast); }
  .trow-ico.editable:hover { border-color: var(--accent-line); filter: brightness(1.04); }
  .trow-ico.editable.open { border-color: var(--accent); }
  .trow-ico.editable:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  /* generalized editable affordance — also used by account / recurring / goal icons */
  .ico-edit .editable { padding: 0; font: inherit; cursor: pointer; border: 1px solid transparent; transition: border-color var(--dur-fast), filter var(--dur-fast); }
  .ico-edit .editable:hover { border-color: var(--accent-line); filter: brightness(1.04); }
  .ico-edit .editable.open { border-color: var(--accent); }
  .ico-edit .editable:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .ico-menu { position: absolute; top: calc(100% + 6px); left: 0; z-index: 40; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-md); box-shadow: var(--shadow-menu); padding: 7px; display: grid; grid-template-columns: repeat(6, 34px); gap: 3px; }
  .ico-opt { width: 34px; height: 34px; display: inline-flex; align-items: center; justify-content: center; border-radius: var(--radius-sm); background: none; border: 1px solid transparent; color: var(--muted); cursor: pointer; transition: background var(--dur-fast), color var(--dur-fast), border-color var(--dur-fast); }
  .ico-opt:hover { background: var(--hover); color: var(--text); }

  /* ============================================================

  .imp-modal { max-width: 540px; }

  .imp-file-sub { font-size: var(--text-2xs); color: var(--muted); font-variant-numeric: tabular-nums; }

  .rcpt-cards { display: flex; flex-direction: column; gap: 12px; max-height: 320px; overflow-y: auto; margin: 0 -2px; padding: 0 2px; }
  .rcpt-card { display: flex; gap: 13px; padding: 11px; border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--input-bg); }
  .rcpt-thumb { position: relative; width: 86px; height: 104px; flex-shrink: 0; border-radius: var(--radius-md); overflow: hidden; background: var(--card); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
  .rcpt-thumb img { width: 100%; height: 100%; object-fit: cover; }

  .rcpt-ph svg { width: 26px; height: 26px; }
  .rcpt-reading { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; background: color-mix(in srgb, var(--card) 78%, transparent); font-size: var(--text-2xs); color: var(--muted); font-weight: 600; }
  .rcpt-fields { flex: 1; min-width: 0; position: relative; display: flex; flex-direction: column; gap: 9px; justify-content: center; }
  .rcpt-field { display: flex; flex-direction: column; gap: 4px; }
  .rcpt-field > span { font-size: var(--text-2xs); color: var(--muted); text-transform: uppercase; letter-spacing: var(--tracking-wide); font-weight: 700; }
  .rcpt-field input, .rcpt-field select { width: 100%; box-sizing: border-box; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: inherit; font-size: var(--text-sm); padding: 7px 9px; font-variant-numeric: tabular-nums; }
  .rcpt-field input:focus, .rcpt-field select:focus { outline: none; border-color: var(--accent); }

  .rcpt-light { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-xl); box-shadow: var(--shadow-pop); width: 100%; max-width: 380px; max-height: 88vh; display: flex; flex-direction: column; overflow: hidden; }

  /* ============================================================
     MOBILE / RESPONSIVE — phones (iOS Safari + Android Chrome)
     The same page adapts responsively; no device detection or
     separate mobile build is needed. Below ~900px the sidebar
     becomes a slide-in drawer behind a top app bar.
     ============================================================ */
  .mobile-topbar { display: none; }
  .nav-scrim { display: none; }
  .drawer-close { display: none; }

  /* responsive KPI strips */
  @media (max-width: 880px) { .kpi-3 { grid-template-columns: 1fr 1fr; } }

  @media (max-width: 900px) {
    body { overflow: hidden; }
    .app { flex-direction: column; height: 100vh; height: 100dvh; }

    /* top app bar */
    .mobile-topbar {
      display: flex; align-items: center; gap: 12px; flex-shrink: 0; z-index: 90;
      background: var(--sidebar); border-bottom: 1px solid var(--border);
      padding: calc(10px + env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) 10px max(14px, env(safe-area-inset-left));
    }
    .hamburger {
      width: 42px; height: 42px; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center;
      padding: 0; border: 1px solid var(--border); border-radius: var(--radius-md);
      background: var(--card); color: var(--text); cursor: pointer;
      transition: background var(--dur-fast);
    }
    .hamburger:hover { background: var(--hover); }
    .hamburger svg { width: 22px; height: 22px; }
    .mobile-brand { display: flex; align-items: center; gap: 9px; }
    .mobile-brand .brand-logo { width: 26px; height: 26px; color: var(--text); }
    .mobile-brand .side-brandname { font-size: var(--text-h2); font-weight: 700; letter-spacing: var(--tracking-tight); }

    /* sidebar → off-canvas drawer */
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; z-index: 200;
      width: 286px; max-width: 84vw; height: 100%; height: 100dvh;
      transform: translateX(-100%);
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--shadow-pop);
      padding-top: calc(16px + env(safe-area-inset-top));
      padding-left: max(12px, env(safe-area-inset-left));
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
    }
    .sidebar.open { transform: none; }
    .side-tab { padding: 13px 12px; font-size: var(--text-body); }
    .drawer-close {
      display: inline-flex; align-items: center; justify-content: center; margin-left: auto;
      width: 36px; height: 36px; flex-shrink: 0; border: none; background: none;
      color: var(--muted); font-size: 25px; line-height: 1; cursor: pointer; border-radius: var(--radius-sm);
      transition: background var(--dur-fast), color var(--dur-fast);
    }
    .drawer-close:hover { background: var(--hover); color: var(--text); }
